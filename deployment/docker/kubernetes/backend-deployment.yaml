services:

  nginx:
    image: nginx:alpine
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "80:80"
    depends_on:
      - frontend
      - backend
    restart: always

  backend:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile.backend
    restart: always
    environment:
      - DATABASE_URL=postgresql://ai:ai@postgres:5432/ai_memory
    depends_on:
      - postgres
    # === Bloco de Ativação da GPU NVIDIA ===
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  frontend:
    build:
      context: ../../
      dockerfile: deployment/docker/Dockerfile.frontend
    restart: always

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ai
      POSTGRES_PASSWORD: ai
      POSTGRES_DB: ai_memory
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

volumes:
  pgdata:
